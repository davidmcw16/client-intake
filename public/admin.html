<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Voice Intake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #14141f;
      --bg-elevated: #1c1c2e;
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--text-dim); font-weight: 400; }

    /* Login */
    .login-form {
      display: flex;
      gap: 12px;
      max-width: 400px;
      margin: 80px auto;
    }

    .login-form input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }

    .login-form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .login-form button {
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .login-form button:active { transform: scale(0.97); }

    .error { color: var(--danger); font-size: 0.85rem; margin-top: 8px; text-align: center; }

    /* Table */
    .sessions-table {
      width: 100%;
      border-collapse: collapse;
    }

    .sessions-table th {
      text-align: left;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sessions-table td {
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .sessions-table tr:hover td {
      background: var(--bg-card);
    }

    .actions-cell {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-sm--view {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-sm--download {
      background: var(--accent);
      color: #fff;
    }

    .btn-sm--prp {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-sm:active { transform: scale(0.97); }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-badge--complete { background: rgba(34,197,94,0.15); color: var(--success); }
    .status-badge--abandoned { background: rgba(239,68,68,0.15); color: var(--danger); }
    .status-badge--started { background: rgba(136,136,160,0.15); color: var(--text-dim); }

    /* Expanded session */
    .session-detail {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      margin: 12px 0 24px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .session-detail h3 {
      font-size: 1rem;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .transcript-entry {
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .transcript-entry--assistant {
      background: var(--bg-elevated);
      border-left: 3px solid var(--accent);
    }

    .transcript-entry--user {
      background: rgba(99, 102, 241, 0.1);
      border-left: 3px solid var(--text-dim);
    }

    .transcript-entry .role {
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .prp-preview {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      white-space: pre-wrap;
      font-size: 0.8rem;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      color: var(--text-dim);
      font-family: 'SF Mono', SFMono-Regular, monospace;
    }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 48px 20px;
      font-size: 0.95rem;
    }

    .logout-btn {
      float: right;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
    }

    @media (max-width: 640px) {
      .sessions-table th:nth-child(2),
      .sessions-table td:nth-child(2),
      .sessions-table th:nth-child(4),
      .sessions-table td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="login-view">
      <h1>Voice Intake <span>— Admin</span></h1>
      <form class="login-form" id="login-form">
        <input type="password" id="password-input" placeholder="Admin password" autocomplete="current-password">
        <button type="submit">Login</button>
      </form>
      <p class="error" id="login-error" style="display:none;"></p>
    </div>

    <div id="dashboard-view" style="display:none;">
      <h1>Voice Intake <span>— Admin</span> <button class="logout-btn" id="btn-logout">Logout</button></h1>
      <table class="sessions-table" id="sessions-table">
        <thead>
          <tr>
            <th>Client</th>
            <th>Date</th>
            <th>Status</th>
            <th>Turns</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="sessions-body"></tbody>
      </table>
      <p class="empty-state" id="empty-state" style="display:none;">No sessions yet.</p>
    </div>
  </div>

  <script>
    const loginView = document.getElementById('login-view');
    const dashboardView = document.getElementById('dashboard-view');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const sessionsBody = document.getElementById('sessions-body');
    const emptyState = document.getElementById('empty-state');
    let expandedRow = null;

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';
      const password = document.getElementById('password-input').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        if (!res.ok) {
          loginError.textContent = 'Invalid password';
          loginError.style.display = 'block';
          return;
        }
        loginView.style.display = 'none';
        dashboardView.style.display = 'block';
        loadSessions();
      } catch (err) {
        loginError.textContent = 'Connection error';
        loginError.style.display = 'block';
      }
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      document.cookie = 'admin_token=; path=/api/admin; expires=Thu, 01 Jan 1970 00:00:00 GMT';
      dashboardView.style.display = 'none';
      loginView.style.display = 'block';
      document.getElementById('password-input').value = '';
    });

    async function loadSessions() {
      try {
        const res = await fetch('/api/admin/sessions');
        if (res.status === 401) {
          dashboardView.style.display = 'none';
          loginView.style.display = 'block';
          return;
        }
        const data = await res.json();
        renderSessions(data.sessions);
      } catch (err) {
        console.error('Failed to load sessions:', err);
      }
    }

    function renderSessions(sessions) {
      sessionsBody.innerHTML = '';
      if (!sessions.length) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      sessions.forEach(s => {
        const tr = document.createElement('tr');
        const date = new Date(s.completed_at || s.created_at).toLocaleDateString();
        const statusClass = s.status === 'Complete' ? 'complete' : s.status === 'Abandoned' ? 'abandoned' : 'started';
        const downloadBtn = s.status === 'Complete'
          ? `<button class="btn-sm btn-sm--download" data-dl="${s.id}">Brief</button>`
          : '';
        const prpBtn = (s.status === 'Complete' && s.has_prp)
          ? `<button class="btn-sm btn-sm--prp" data-prp-dl="${s.id}">PRP</button>`
          : '';
        tr.innerHTML = `
          <td>${escapeHtml(s.client_name || 'Unknown')}</td>
          <td>${date}</td>
          <td><span class="status-badge status-badge--${statusClass}">${s.status}</span></td>
          <td>${s.turn_count || 0}</td>
          <td>
            <div class="actions-cell">
              <button class="btn-sm btn-sm--view" data-id="${s.id}">View</button>
              ${downloadBtn}
              ${prpBtn}
            </div>
          </td>
        `;
        sessionsBody.appendChild(tr);
      });

      sessionsBody.querySelectorAll('[data-id]').forEach(btn => {
        btn.addEventListener('click', () => toggleDetail(btn.dataset.id, btn.closest('tr')));
      });

      sessionsBody.querySelectorAll('[data-dl]').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `/api/admin/sessions/${btn.dataset.dl}/download`;
        });
      });

      sessionsBody.querySelectorAll('[data-prp-dl]').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `/api/admin/sessions/${btn.dataset.prpDl}/download-prp`;
        });
      });
    }

    async function toggleDetail(id, row) {
      if (expandedRow) {
        expandedRow.remove();
        if (expandedRow.dataset.sessionId === id) {
          expandedRow = null;
          return;
        }
        expandedRow = null;
      }

      try {
        const res = await fetch(`/api/admin/sessions/${id}`);
        const session = await res.json();

        const detailRow = document.createElement('tr');
        detailRow.dataset.sessionId = id;
        const td = document.createElement('td');
        td.colSpan = 5;

        let html = '<div class="session-detail">';
        html += '<h3>Conversation</h3>';

        const messages = session.messages || [];
        messages.forEach(m => {
          html += `<div class="transcript-entry transcript-entry--${m.role}">
            <div class="role">${m.role}</div>
            ${escapeHtml(m.content)}
          </div>`;
        });

        if (session.markdown) {
          html += '<h3 style="margin-top:24px;">Generated Brief</h3>';
          html += `<div class="prp-preview">${escapeHtml(session.markdown)}</div>`;
        }

        if (session.prp_markdown) {
          html += '<h3 style="margin-top:24px;">Generated Developer PRP</h3>';
          html += `<div class="prp-preview">${escapeHtml(session.prp_markdown)}</div>`;
        }

        html += '</div>';
        td.innerHTML = html;
        detailRow.appendChild(td);
        row.after(detailRow);
        expandedRow = detailRow;
      } catch (err) {
        console.error('Failed to load session detail:', err);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
